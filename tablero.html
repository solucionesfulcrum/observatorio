<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero del indicador</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        background: #F0F4F8;
        color: #1A2B3C;
        font-size: 14px;
        line-height: 1.5;
    }
    .hdr {
        background: #0077C8;
        padding: 8px 32px;
        height: 84px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
    }
    .hdr-brand { display: flex; align-items: center; gap: 14px; }
    .hdr-logos { display: flex; align-items: center; gap: 6px; }
    .hdr-logo-img {
        height: 41px;
        width: auto;
        display: block;
        background: #0077C8;
        padding: 5px 10px;
        border-radius: 10px;
    }
    .hdr-logo-essalud {
        background: #0077C8;
    }
    .hdr-logo-ietsi {
        background: #0077C8;
        transform: scaleX(1.15);
        transform-origin: left center;
        margin-right: 14px;
    }
    .lg-sep { color: rgba(255,255,255,0.35); font-size: 14px; }
    .hdr-tit { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; }
    .hdr-sub { font-size: 16px; color: rgba(255,255,255,0.85); margin-top: 2px; }
    .main-tablero {
        flex: 1;
        padding: 18px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
    }
    .tablero-title {
        background: #fff;
        border: 0.5px solid #D0D8E4;
        border-radius: 10px;
        padding: 12px 16px;
    }
    .tablero-title h1 { font-size: 16px; color: #1A2B3C; line-height: 1.35; }
    .tablero-title p { font-size: 12px; color: #6B7A8D; margin-top: 3px; }
    .iframe-box {
        flex: 1;
        min-height: 70vh;
        background: #fff;
        border: 0.5px solid #D0D8E4;
        border-radius: 10px;
        overflow: hidden;
    }
    .iframe-box iframe { width: 100%; height: 100%; min-height: 70vh; border: 0; display: block; }
    .iframe-error {
        padding: 24px;
        font-size: 13px;
        color: #6B7A8D;
    }
    .ftr {
        background: #fff;
        border-top: 0.5px solid #D0D8E4;
        padding: 14px 32px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex-shrink: 0;
    }
    .ftr-top { display: flex; justify-content: space-between; align-items: center; }
    .ftr-brand { font-size: 11px; color: #6B7A8D; }
    .ftr-ver { font-size: 11px; color: #6B7A8D; }
    .ftr-disc {
        font-size: 11px;
        color: #888780;
        line-height: 1.6;
        padding-top: 8px;
        border-top: 0.5px solid #EDF0F4;
    }
</style>
</head>
<body>
<header class="hdr">
    <div class="hdr-brand">
        <div class="hdr-logos">
            <img src="essalud.webp" alt="EsSalud" class="hdr-logo-img hdr-logo-essalud" />
            <span class="lg-sep">&middot;</span>
            <img src="IETSI.webp" alt="IETSI" class="hdr-logo-img hdr-logo-ietsi" />
        </div>
        <div>
            <div class="hdr-tit">Observatorio de Adherencia a Guías de Práctica Clínica</div>
            <div class="hdr-sub">Instituto de Evaluación de Tecnologías en Salud e Investigación</div>
        </div>
    </div>
</header>

<main class="main-tablero">
    <section class="iframe-box" id="iframe-box">
        <iframe id="iframe-tablero" src="" title="Power BI" allowfullscreen></iframe>
    </section>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    const titulo = params.get('titulo') || 'Tablero del indicador';

    document.title = titulo;

    if (url) {
        document.getElementById('iframe-tablero').src = url;
    } else {
        document.getElementById('iframe-box').innerHTML = '<div class="iframe-error">No se recibió el enlace del tablero.</div>';
    }
</script>
</body>
</html>
